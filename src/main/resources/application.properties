spring.application.name=policysubmission
server.port=8080

# AWS region is resolved by DefaultAwsRegionProviderChain (env, system, profile incl. SSO, IMDS). Optionally override:
# aws.s3.region=us-east-1

# Default S3 bucket (can be overridden by env var or property at runtime)
aws.s3.defaultBucket=vm-ctwo-email-docs

# AWS Bedrock Agent Configuration
# Region can come from env var AWS_REGION/AWS_DEFAULT_REGION; this property is an optional override.
aws.bedrock.region=${AWS_BEDROCK_REGION:us-east-1}

# Bedrock Agent IDs are environment-driven to avoid hard-coded deployment values.
aws.bedrock.agent.id=${AWS_BEDROCK_AGENT_ID:MOCK-AGENT-ID}
aws.bedrock.agent.alias.id=${AWS_BEDROCK_AGENT_ALIAS_ID:LFZQYFUWQZ}

# Keep mock mode on by default; set AWS_BEDROCK_AGENT_MOCK_MODE=false to switch to live invocation wiring later.
aws.bedrock.agent.mock-mode=${AWS_BEDROCK_AGENT_MOCK_MODE:true}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
